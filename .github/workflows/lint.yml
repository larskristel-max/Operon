name: Lint

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Skip generation for fork/missing-secret PRs; in that case we use committed supabase types.
      - name: Generate Supabase types
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
        run: npm run gen:types
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Note: types are regenerated fresh on CI runs where credentials are available.
      #       Local developers should run `npm run gen:types` after any schema change.

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint
