name: Lint

on:
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches-ignore:
      - main

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    # belt-and-suspenders: skip on main even when GitHub bypasses the push
    # branch-filter because the workflow file itself was modified.
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Expose whether the token is set as a plain env var so step `if:` can
    # check it — secrets context is not allowed in step-level if conditions.
    env:
      HAS_SUPABASE_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Runs only when SUPABASE_ACCESS_TOKEN is set as a repo secret.
      # Failure here surfaces a broken/missing token so schema PRs cannot
      # silently merge with stale types.
      - name: Generate Supabase types
        if: env.HAS_SUPABASE_TOKEN == 'true'
        run: npm run gen:types
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Catches schema changes not followed by `npm run gen:types` locally.
      - name: Verify generated types are committed
        if: env.HAS_SUPABASE_TOKEN == 'true'
        run: |
          if ! git diff --quiet src/types/supabase.ts; then
            echo "::error::src/types/supabase.ts is out of date."
            echo "Run 'npm run gen:types' locally and commit the updated file."
            git diff src/types/supabase.ts
            exit 1
          fi
          echo "src/types/supabase.ts is up to date with live schema."

      # always() ensures typecheck and lint run even when gen:types fails,
      # so you see the full CI picture in one pass.
      - name: Run typecheck
        if: always()
        run: npm run typecheck

      - name: Run lint
        if: always()
        run: npm run lint
