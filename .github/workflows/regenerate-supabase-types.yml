name: Regenerate Supabase Types

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

concurrency:
  group: regen-types-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate-types:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_SUPABASE_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Supabase token
        run: |
          if [ "${HAS_SUPABASE_TOKEN}" != "true" ]; then
            echo "SUPABASE_ACCESS_TOKEN not available. Skipping type generation."
          else
            echo "SUPABASE_ACCESS_TOKEN available."
          fi

      - name: Generate Supabase types
        if: env.HAS_SUPABASE_TOKEN == 'true'
        run: npm run gen:types
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Commit regenerated types
        if: env.HAS_SUPABASE_TOKEN == 'true'
        run: |
          if git diff --quiet src/types/supabase.ts; then
            echo "Supabase types already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types/supabase.ts
          git commit -m "chore: regenerate Supabase types"
          git push
